name: docker-build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch: null

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.cfg.MINIFORGE_NAME }}:${{ matrix.cfg.MINIFORGE_VERSION }} (${{ matrix.distro-arch }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cfg:
          - MINIFORGE_NAME: "Miniforge3"
            MINIFORGE_VERSION: "26.3.2-2"
            DOCKERFILE: "ubuntu"
        distro-arch:
          - arm64/v8
          - amd64
          - ppc64le
    env:
      MINIFORGE_NAME: ${{ matrix.cfg.MINIFORGE_NAME }}
      MINIFORGE_VERSION: ${{ matrix.cfg.MINIFORGE_VERSION }}
      DOCKERFILE: ${{ matrix.cfg.DOCKERFILE }}
      DISRO_ARCH: ${{ matrix.distro-arch }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: enable experimental features (needed for squash)
        run: |
          sudo cp docker_daemon_config.json /etc/docker/daemon.json
          sudo service docker restart        

      - name: docker info
        run: |
          docker info

      - name: Configure qemu
        run: |
          ./download-qemu-static.sh

      - name: build and test image
        run: |
          docker build \
            --build-arg DISTRO_ARCH \
            --build-arg MINIFORGE_NAME \
            --build-arg MINIFORGE_VERSION \
            -f ubuntu/Dockerfile \
            -t condaforge/${MINIFORGE_NAME/M/m}:latest \
            -t condaforge/${MINIFORGE_NAME/M/m}:${MINIFORGE_VERSION} \
            -t localforge \
            --no-cache \
            --squash \
            .
          
          pushd tests
          docker build \
            --build-arg DISTRO_ARCH \
            --build-arg IMAGE_TO_TEST=localforge \
            -f Dockerfile.root \
            --no-cache \
            .
          popd

      - name: deploy
        if: github.ref == 'refs/heads/main' && github.repository == 'conda-forge/miniforge-images'
        env:
          CFD_QUAY_PASSWORD: ${{ secrets.CF_DAEMON_QUAY_PASSWORD }}
          DH_PASSWORD: ${{ secrets.CF_BOT_DH_PASSWORD }}
        run: |
            # dockerhub
            docker login -u condaforgebot -p ${DH_PASSOWRD}
            docker push condaforge/${MINIFORGE_NAME/M/m}:latest
            docker push condaforge/${MINIFORGE_NAME/M/m}:${MINIFORGE_VERSION}

            # quay.io
            docker login -u conda_forge_daemon -p ${CFD_QUAY_PASSWORD} quay.io
            docker tag condaforge/${MINIFORGE_NAME/M/m}:latest quay.io/condaforge/${MINIFORGE_NAME/M/m}:latest
            docker push quay.io/condaforge/${MINIFORGE_NAME/M/m}:latest
            docker tag condaforge/${MINIFORGE_NAME/M/m}:${MINIFORGE_VERSION} quay.io/condaforge/${MINIFORGE_NAME/M/m}:${MINIFORGE_VERSION}
            docker push quay.io/condaforge/${MINIFORGE_NAME/M/m}:${MINIFORGE_VERSION}

  build-success:
    name: Build success
    runs-on: ubuntu-slim
    needs: build
    steps:
      - name: notify build success
        run: echo "Build was successful!"
